name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Run Tests First ──────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest -q

  # ── Build & Push Docker Images to GHCR ───────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-backend:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-worker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-worker:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-frontend:${{ github.sha }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-backend:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ── Deploy (placeholder — swap for Render/Railway/K8s) ─
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Deployment trigger
        run: |
          echo "✅ Images pushed to GHCR successfully!"
          echo "Backend:  ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-backend:${{ github.sha }}"
          echo "Worker:   ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-worker:${{ github.sha }}"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-frontend:${{ github.sha }}"
          echo ""
          echo "📦 To deploy to Render/Railway, configure auto-deploy from GHCR."
          echo "🔧 To deploy to K8s, uncomment the kubectl commands below."

      # Uncomment below when you have a Kubernetes cluster:
      # - name: Roll out to K8s
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.K8S_HOST }}
      #     username: ${{ secrets.K8S_USER }}
      #     key: ${{ secrets.K8S_SSH_KEY }}
      #     script: |
      #       kubectl -n debtlens set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-backend:${{ github.sha }}
      #       kubectl -n debtlens set image deployment/worker worker=${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-worker:${{ github.sha }}
      #       kubectl -n debtlens set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.OWNER }}/debtlens-frontend:${{ github.sha }}
