name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  # ── Backend Tests ────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest -q

  # ── Frontend Build Check ─────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Docker Build Validation ──────────────────────────
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t debtlens-backend:ci ./backend

      - name: Build worker image
        run: docker build -t debtlens-worker:ci -f ./backend/Dockerfile.worker ./backend

      - name: Build frontend image
        run: docker build -t debtlens-frontend:ci ./frontend

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: debtlens-backend:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: debtlens-frontend:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
