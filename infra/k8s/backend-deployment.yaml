apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: debtlens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/kritikgianta/debtlens-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: REDIS_URL
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: GITHUB_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: GITHUB_REDIRECT_URI
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: GITHUB_WEBHOOK_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: ENCRYPTION_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: GROQ_API_KEY
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: MLFLOW_TRACKING_URI
            - name: API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: API_BASE_URL
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: debtlens-secrets
                  key: CORS_ORIGINS
            - name: DEFAULT_PLAN_TIER
              value: free
            - name: CELERY_TASK_TIME_LIMIT_SECONDS
              value: "7200"
            - name: MAX_FILES_PER_ANALYSIS
              value: "1200"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
