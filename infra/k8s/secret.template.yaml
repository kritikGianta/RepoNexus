apiVersion: v1
kind: Secret
metadata:
  name: debtlens-secrets
  namespace: debtlens
type: Opaque
stringData:
  DATABASE_URL: mysql+aiomysql://<user>:<password>@<host>:3306/debtlens
  REDIS_URL: rediss://:<token>@<upstash-host>:6379
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GITHUB_REDIRECT_URI: https://api.yourdomain.com/api/v1/auth/github/callback
  GITHUB_WEBHOOK_SECRET: ""
  JWT_SECRET: ""
  ENCRYPTION_KEY: ""
  GROQ_API_KEY: ""
  MLFLOW_TRACKING_URI: http://mlflow-service:5000
  API_BASE_URL: https://api.yourdomain.com
  CORS_ORIGINS: https://app.yourdomain.com
